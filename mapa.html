<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Aerdan</title>

<link rel="stylesheet" href="css/style.css">

<style>

.mapa-container{

    display:flex;
    min-height:100vh;
}

.mapa-mundo{

    flex:1;

    position:relative;

    background:
    linear-gradient(
    rgba(0,0,0,.35),
    rgba(0,0,0,.35)
    ),
    url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1600");

    background-size:cover;
    background-position:center;
}

.regiao{

    position:absolute;

    background:#1a1329;

    border:2px solid #c59d4d;

    color:white;

    padding:12px 18px;

    border-radius:12px;

    cursor:pointer;

    transition:.3s;
}

.regiao:hover{

    background:#2a1d45;

    transform:scale(1.05);
}

#hielo{
    top:10%;
    left:45%;
}

#amazonas{
    top:35%;
    left:20%;
}

#demonios{
    top:35%;
    right:18%;
}

#centro{
    top:45%;
    left:45%;
}

#orcos{
    bottom:20%;
    left:28%;
}

#bestias{
    bottom:20%;
    right:28%;
}

#desconocido{
    bottom:5%;
    left:45%;
}

.panel-info{

    width:380px;

    background:#0c0815;

    border-left:2px solid #6a5228;

    padding:30px;

    color:white;
}

.panel-info h2{

    color:#d6b16d;

    margin-bottom:20px;
}

.panel-info p{

    color:#cfcfcf;

    line-height:1.6;
}

.estado{

    margin-top:20px;
    color:#8ee68e;
}

.capitulos{

    margin-top:30px;
}

.capitulos ul{

    padding-left:20px;
}

.btn-entrar{

    display:block;

    margin-top:30px;

    text-align:center;

    padding:15px;

    background:#b58a3a;

    color:black;

    font-weight:bold;

    text-decoration:none;

    border-radius:10px;
}

.btn-entrar:hover{

    filter:brightness(1.1);
}

@media(max-width:900px){

    .mapa-container{

        flex-direction:column;
    }

    .panel-info{

        width:100%;
    }

}

</style>

</head>

<body>

<div class="mapa-container">

    <div class="mapa-mundo">

        <div class="regiao" id="hielo"
        onclick="mostrarRegion('hielo')">
        Reino de Hielo
        </div>

        <div class="regiao" id="amazonas"
        onclick="mostrarRegion('amazonas')">
        Amazonas
        </div>

        <div class="regiao" id="demonios"
        onclick="mostrarRegion('demonios')">
        Dominio Demoníaco
        </div>

        <div class="regiao" id="centro"
        onclick="mostrarRegion('centro')">
        Reino Central
        </div>

        <div class="regiao" id="orcos"
        onclick="mostrarRegion('orcos')">
        Orcos
        </div>

        <div class="regiao" id="bestias"
        onclick="mostrarRegion('bestias')">
        Hombres Bestia
        </div>

        <div class="regiao" id="desconocido"
        onclick="mostrarRegion('desconocido')">
        ???
        </div>

    </div>

    <div class="panel-info">

        <h2 id="nombre-region">
            Selecciona una región
        </h2>

        <p id="descripcion-region">
            Haz clic en cualquier territorio del continente para obtener información.
        </p>

        <div class="estado" id="estado-region">
            Estado: ---
        </div>

        <div class="capitulos">

            <h3>Capítulos</h3>

            <ul id="lista-capitulos">

                <li>---</li>

            </ul>

        </div>

        <a href="#" class="btn-entrar">
            Entrar
        </a>

    </div>

</div>

<script>

const regiones = {

    hielo:{
        nombre:"Reino de Hielo",
        descripcion:"Una tierra congelada donde la nieve nunca desaparece.",
        estado:"Disponible",
        capitulos:[
            "Capítulo 1",
            "Capítulo 2",
            "Capítulo 3"
        ]
    },

    amazonas:{
        nombre:"Amazonas",
        descripcion:"Guerreras salvajes que dominan los bosques ancestrales.",
        estado:"Disponible",
        capitulos:[
            "Capítulo 1",
            "Capítulo 2",
            "Capítulo 3"
        ]
    },

    demonios:{
        nombre:"Dominio Demoníaco",
        descripcion:"Territorio gobernado por una poderosa súcubo.",
        estado:"Disponible",
        capitulos:[
            "Capítulo 1",
            "Capítulo 2",
            "Capítulo 3"
        ]
    },

    centro:{
        nombre:"Reino Central",
        descripcion:"El corazón político y comercial de Aerdan.",
        estado:"Disponible",
        capitulos:[
            "Capítulo 1"
        ]
    },

    orcos:{
        nombre:"Clanes Orcos",
        descripcion:"Tribus guerreras que respetan la fuerza.",
        estado:"Disponible",
        capitulos:[
            "Capítulo 1",
            "Capítulo 2"
        ]
    },

    bestias:{
        nombre:"Hombres Bestia",
        descripcion:"Felinos orgullosos y cazadores legendarios.",
        estado:"Disponible",
        capitulos:[
            "Capítulo 1",
            "Capítulo 2"
        ]
    },

    desconocido:{
        nombre:"Región Desconocida",
        descripcion:"Cubierta por una misteriosa niebla.",
        estado:"Bloqueada",
        capitulos:[
            "???"
        ]
    }

};

function mostrarRegion(id){

    const r = regiones[id];

    document.getElementById("nombre-region").innerText =
    r.nombre;

    document.getElementById("descripcion-region").innerText =
    r.descripcion;

    document.getElementById("estado-region").innerText =
    "Estado: " + r.estado;

    let html = "";

    r.capitulos.forEach(cap => {

        html += "<li>"+cap+"</li>";

    });

    document.getElementById("lista-capitulos").innerHTML =
    html;
}

</script>

</body>
</html>
