<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kingdom Archives</title>

<style>

/* GENERAL */

body{
margin:0;
font-family:Verdana,sans-serif;
overflow:hidden;
background:black;
color:white;
}

/* ESCENA */

#scene{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

/* FONDO */

#background{
position:absolute;
width:100%;
height:100%;
background-image:url('fondos/FONDO1.jpg');
background-size:cover;
background-position:center;
z-index:1;
}

/* OSCURECER UN POCO */

#overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:2;
}

/* SPRITES */

.sprite{
position:absolute;
bottom:0;
height:90%;
z-index:3;
transition:0.3s;
}

/* POSICIONES */

.left{
left:3%;
}

.center{
left:35%;
}

.right{
right:3%;
}

/* CAJA DIALOGO */

#dialogueBox{
position:absolute;
bottom:0;
width:100%;
background:rgba(25,15,5,0.94);
border-top:5px solid #d8a55d;
padding:25px;
z-index:5;
box-sizing:border-box;
}

/* NOMBRE */

#name{
font-size:30px;
font-weight:bold;
color:#ffcf7d;
margin-bottom:15px;
}

/* TEXTO */

#text{
font-size:24px;
line-height:1.7;
margin-bottom:25px;
max-width:1400px;
}

/* BOTON */

#nextButton{
background:#5b3b1a;
border:3px solid #d8a55d;
color:white;
padding:15px 25px;
font-size:18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

#nextButton:hover{
background:#8b5c2f;
}

/* TITULO */

#chapterTitle{
position:absolute;
top:20px;
left:20px;
background:rgba(20,10,5,0.8);
padding:15px 25px;
border:3px solid #d8a55d;
border-radius:12px;
font-size:28px;
font-weight:bold;
color:#ffcf7d;
z-index:10;
}

/* RESPONSIVE */

@media(max-width:900px){

.sprite{
height:75%;
}

#text{
font-size:20px;
}

#name{
font-size:26px;
}

}

</style>

</head>

<body>

<div id="scene">

<!-- FONDO -->

<div id="background"></div>

<div id="overlay"></div>

<!-- TITULO -->

<div id="chapterTitle">
⚔ CAPÍTULO 1
</div>

<!-- SPRITES -->

<img
id="spriteLeft"
class="sprite left"
src="sprites/TSUKI_feliz.png"
>

<img
id="spriteRight"
class="sprite right"
src="sprites/HANA_feliz.png"
>

<!-- DIALOGO -->

<div id="dialogueBox">

<div id="name">
TSUKI
</div>

<div id="text">
El reino permaneció en silencio durante muchos años...
hasta esta noche.
</div>

<button id="nextButton" onclick="nextScene()">
Continuar
</button>

</div>

</div>

<script>

/* ESCENAS */

let currentScene = 0;

const scenes = [

/* ESCENA 1 */

{
background: "fondos/FONDO1.jpg",

leftSprite: "sprites/TSUKI_feliz.png",

rightSprite: "sprites/HANA_feliz.png",

name: "TSUKI",

text:
"El reino permaneció en silencio durante muchos años... hasta esta noche."
},

/* ESCENA 2 */

{
background: "fondos/FONDO1.jpg",

leftSprite: "sprites/TSUKI_feliz.png",

rightSprite: "sprites/HANA_feliz.png",

name: "HANA",

text:
"Algo extraño ocurrió cerca del castillo."
},

/* ESCENA 3 */

{
background: "fondos/FONDO2.jpg",

leftSprite: "sprites/SHUUKO_feliz.png",

rightSprite: "sprites/IKTAN_feliz.png",

name: "SHUUKO",

text:
"Debemos movernos antes del amanecer."
},

/* ESCENA 4 */

{
background: "fondos/FONDO2.jpg",

leftSprite: "sprites/IKTAN_feliz.png",

rightSprite: "sprites/SHUUKO_feliz.png",

name: "IKTAN",

text:
"Entonces el destino del reino finalmente cambiará."
}

];

/* FUNCION */

function nextScene(){

currentScene++;

if(currentScene >= scenes.length){

currentScene = 0;

}

const scene = scenes[currentScene];

/* CAMBIAR FONDO */

document.getElementById("background").style.backgroundImage =
`url('${scene.background}')`;

/* CAMBIAR SPRITES */

document.getElementById("spriteLeft").src =
scene.leftSprite;

document.getElementById("spriteRight").src =
scene.rightSprite;

/* CAMBIAR TEXTO */

document.getElementById("name").innerText =
scene.name;

document.getElementById("text").innerText =
scene.text;

}

</script>

</body>

</html>
