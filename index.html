<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retro Kingdom VN</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:'Trebuchet MS', sans-serif;
    background:#3b2a1a;
    color:white;
}

/* Fondo */

#background{
    position:fixed;
    width:100%;
    height:100%;
    background-image:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    filter:brightness(0.45) sepia(0.4);
}

/* Oscurecer */

#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(25,15,5,0.45);
}

/* Pantalla principal */

#game{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* Barra superior */

#topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:rgba(40,20,5,0.8);
    border-bottom:4px solid #d8a85c;
    box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

#logo{
    font-size:34px;
    font-weight:bold;
    color:#ffcf7d;
    text-shadow:2px 2px #000;
}

#menu{
    display:flex;
    gap:15px;
}

.menuBtn{
    background:#5a3815;
    border:3px solid #d8a85c;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
}

.menuBtn:hover{
    background:#8b5a2b;
    transform:translateY(-2px);
}

/* Zona central */

#center{
    flex-grow:1;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:80px;
    padding-bottom:40px;
}

/* Personajes */

.character{
    width:220px;
    height:420px;
    border:5px solid #ffcf7d;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:110px;
    box-shadow:0 0 20px rgba(0,0,0,0.7);
}

.red{
    background:#7a2f2f;
}

.blue{
    background:#2f4f7a;
}

/* Caja de diálogo */

#dialogueBox{
    background:rgba(35,20,5,0.95);
    border-top:5px solid #ffcf7d;
    padding:25px;
    box-shadow:0 -5px 15px rgba(0,0,0,0.5);
}

/* Nombre */

#name{
    color:#ffcf7d;
    font-size:28px;
    margin-bottom:12px;
    font-weight:bold;
    text-shadow:2px 2px #000;
}

/* Texto */

#text{
    font-size:22px;
    line-height:1.7;
    margin-bottom:25px;
    color:#f2e2c4;
}

/* Opciones */

#choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

/* Botones */

.choiceBtn{
    background:#5a3815;
    border:3px solid #d8a85c;
    color:white;
    padding:18px;
    border-radius:12px;
    cursor:pointer;
    transition:0.25s;
    font-size:18px;
    font-weight:bold;
}

.choiceBtn:hover{
    background:#8b5a2b;
    transform:scale(1.03);
}

/* Footer */

#footer{
    position:absolute;
    bottom:8px;
    right:15px;
    font-size:12px;
    color:#c2a77d;
}

</style>
</head>

<body>

<div id="background"></div>
<div id="overlay"></div>

<div id="game">

    <!-- Barra superior -->

    <div id="topBar">

        <div id="logo">
            ⚔ RETRO KINGDOM
        </div>

        <div id="menu">

            <button class="menuBtn">
                Inventario
            </button>

            <button class="menuBtn">
                Guardar
            </button>

            <button class="menuBtn">
                Config
            </button>

        </div>

    </div>

    <!-- Personajes -->

    <div id="center">

        <div class="character red">
            🧙
        </div>

        <div class="character blue">
            ⚔️
        </div>

    </div>

    <!-- Caja diálogo -->

    <div id="dialogueBox">

        <div id="name">
            Reina Elara
        </div>

        <div id="text">
            “El reino ha permanecido en guerra durante cien años...
            y tú eres la única esperanza restante.”
        </div>

        <div id="choices">

            <button class="choiceBtn" onclick="choice1()">
                Aceptar la misión
            </button>

            <button class="choiceBtn" onclick="choice2()">
                Rechazar el destino
            </button>

        </div>

    </div>

</div>

<div id="footer">
    Retro RPG VN Prototype
</div>

<script>

function choice1(){

    document.getElementById('name').innerText = 'Narrador';

    document.getElementById('text').innerText =
    'El héroe aceptó portar la espada sagrada del reino.';
}

function choice2(){

    document.getElementById('name').innerText = 'Narrador';

    document.getElementById('text').innerText =
    'El héroe decidió abandonar el castillo antes del amanecer.';
}

</script>

</body>
</html>
