<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kingdom Archives</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

#background{
    position:fixed;
    width:100%;
    height:100%;
    background-image:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    filter:brightness(0.4);
}

#overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
}

#game{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

#title{
    padding:30px;
}

#title h1{
    font-size:60px;
    color:gold;
    margin:0;
}

#title p{
    max-width:700px;
    line-height:1.6;
    color:#ddd;
}

#characters{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:50px;
    flex-grow:1;
}

.character{
    width:220px;
    height:420px;
    border-radius:20px 20px 0 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:120px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.red{
    background:#661111;
    border:4px solid #ff5555;
}

.blue{
    background:#112266;
    border:4px solid #5599ff;
}

#dialogueBox{
    background:rgba(0,0,0,0.85);
    border-top:4px solid gold;
    padding:25px;
}

#name{
    color:gold;
    font-size:24px;
    margin-bottom:10px;
    font-weight:bold;
}

#text{
    font-size:20px;
    line-height:1.6;
    color:#eee;
    margin-bottom:20px;
}

.choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

button{
    background:#222;
    color:white;
    border:2px solid gold;
    padding:18px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    border-radius:10px;
}

button:hover{
    background:#554400;
    transform:scale(1.03);
}

</style>
</head>

<body>

<div id="background"></div>
<div id="overlay"></div>

<div id="game">

<div id="title">
    <h1>KINGDOM ARCHIVES</h1>

    <p>
        Una novela visual RPG medieval inspirada en aventuras clásicas,
        decisiones narrativas y rutas múltiples.
    </p>
</div>

<div id="characters">

    <div class="character red">
        🧙
    </div>

    <div class="character blue">
        ⚔️
    </div>

</div>

<div id="dialogueBox">

    <div id="name">
        Reina Elara
    </div>

    <div id="text">
        “Si cruzas las puertas del reino esta noche...
        no podrás volver a tu antigua vida.”
    </div>

    <div class="choices">

        <button onclick="choice1()">
            Aceptar el destino del reino
        </button>

        <button onclick="choice2()">
            Rechazar la propuesta
        </button>

    </div>

</div>

</div>

<script>

function choice1(){
    document.getElementById("name").innerText = "Narrador";

    document.getElementById("text").innerText =
    "El héroe decidió entrar al reino prohibido.";
}

function choice2(){
    document.getElementById("name").innerText = "Narrador";

    document.getElementById("text").innerText =
    "El héroe rechazó el llamado del reino.";
}

</script>

</body>
</html>
